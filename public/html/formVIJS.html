<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario con validación</title>
    <link rel="stylesheet" href="../css/formStyles.css" type="text/css" />
    

</head>
<body>
    <h2>Formulario de registro</h2>
    <form id="miFormulario" action="" enctype="application/x-www-form-urlencoded" novalidate>
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" 
               pattern="[a-zA-Z\s]{3,50}" 
               placeholder="Ej. Juan López" required autofocus>
        <span class="mensaje" id="error-nombre"></span>

        <label for="tel">Teléfono:</label>
        <input type="text" id="tel" name="tel" 
               pattern="^\(52\)\d{10}$" 
               required
               placeholder="(52)5543234401">
        <span class="mensaje" id="error-tel"></span>
        
        <label for="correo">Correo electrónico:</label>
        <input type="email" id="correo" name="correo"
               placeholder="correo@ejemplo.com" required>
        <span class="mensaje" id="error-correo"></span>

        <div class="btnContainer">            
            <button class="submit" type="submit">Enviar</button>
            <button class="reset" type="reset">Limpiar</button>
        </div>
        
    </form>

    <pre id="resultado"></pre>

    <script src="../js/validateFormB.js"></script>


</body>
</html>
