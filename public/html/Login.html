<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio</title>
    <link rel="stylesheet" href="../css/formStyles.css" type="text/css" />
    

</head>
<body>
    <h2>Inicio de sesion</h2>
    <form id="Inciosession" action="" enctype="application/x-www-form-urlencoded" novalidate>
        
        <label for="correo">Correo electrónico:</label>
        <input type="email" id="correo" name="correo"
               placeholder="correo@ejemplo.com" required>
        <span class="mensaje" id="error-correo"></span>

        <label for="Password">Contraseña:</label>
        <input type="password" id="Password" name="Password"
               placeholder="*****" required>
        <span class="mensaje" id="error-password"></span>

        <a href="/html/Restablecerpass.html">¿Olvido su contraseña?</a>
        <a href="/html/formVIJS.html">¿No tiene cuenta?</a>

        <div class="btnContainer">            
            <button class="submit" type="submit">Iniciar sesión</button>
            
        </div>
        
    </form>

    <pre id="resultado"></pre>

    <script src="../js/validateFormB.js"></script>
    <script src="../js/login.js"></script>


</body>
</html>
