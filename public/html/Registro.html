<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario con validación</title>
    <link rel="stylesheet" href="../css/formStyles.css" type="text/css" />
    

</head>
<body>
    <h2>Formulario de registro</h2>
    <form id="miFormulario" action="" enctype="application/x-www-form-urlencoded" novalidate>
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" 
               pattern="[a-zA-Z\s]{3,50}" 
               placeholder="Ej. Juan López" required autofocus>
        <span class="mensaje" id="error-nombre"></span>
  
        <label for="correo">Correo electrónico:</label>
        <input type="email" id="correo" name="correo"
               placeholder="correo@ejemplo.com" required>
        <span class="mensaje" id="error-correo"></span>

        <label for="Password">Contraseña:</label>
        <input type="password" id="Password" name="Password"
               placeholder="*****" required>
        <span class="mensaje" id="error-password"></span>

        <label for="Confirm">Confirmar Contraseña:</label>
        <input type="password" id="ConPassword" name="ConPassword"
               placeholder="*****" required>
        <span class="mensaje" id="error-ConPass"></span>

        
        <label for="PreguntaRecuperacion">Pregunta de recuperación:</label>
        <input type="text" id="PreguntaRecuperacion" name="PreguntaRecuperacion"  
            placeholder="Ej.¿Cuál es el nombre de tu perro?"   
            required autofocus>
        <span class="mensaje" id="error-Pregunta"></span>


        <label for="RespuestaRecuperacion">Respuesta de Recuperacion:</label>
        <input type="password" id="RespuestaRecuperacion" name="RespuestaRecuperacion"  
               placeholder="Ej.Max"
                required autofocus>
        <span class="mensaje" id="error-Respuesta"></span>


        <div class="btnContainer">            
            <button class="submit" type="submit">Registrar</button>
            <button class="reset" type="reset">Limpiar</button>
        </div>
        
    </form>

    <pre id="resultado"></pre>
    <script src="../js/assets.js"></script>

 <!--   <script src="../js/validateFormB.js"></script>-->


</body>
</html>
